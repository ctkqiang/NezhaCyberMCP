name: 部署官网到 AWS S3 + CloudFront

on:
  push:
    branches: [main, master]
    paths:
      - 'landing/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  S3_BUCKET: nezhacybermcp
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  AWS_REGION: ap-east-1

jobs:
  deploy-landing:
    name: 构建并部署到 S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        working-directory: ./landing
        run: bun install --frozen-lockfile

      - name: 构建静态站点
        working-directory: ./landing
        run: bun run generate

      - name: 配置 AWS 凭证
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 同步文件到 S3
        run: |
          echo "同步静态文件到 S3..."

          # 上传静态资源（长缓存）
          aws s3 sync ./landing/.output/public/ "s3://$S3_BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          # 上传 HTML（禁止缓存 — SPA 回退需要）
          aws s3 sync ./landing/.output/public/ "s3://$S3_BUCKET/" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html"

      - name: 刷新 CloudFront 缓存
        run: |
          echo "创建 CloudFront 缓存刷新..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)

          echo "刷新 ID: $INVALIDATION_ID"
          aws cloudfront wait invalidation-completed \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --id "$INVALIDATION_ID"
          echo " 缓存刷新完成"

      - name: 部署摘要
        run: |
          echo "部署完成！"
          echo "S3: s3://$S3_BUCKET/"
          echo "缓存: 已清除"
